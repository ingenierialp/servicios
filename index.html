<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>LP Ingenieria</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e3f2fd; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px; 
            overflow-x: hidden; 
        }

        .card-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 900px; 
            padding: 24px; 
            margin: auto;
            flex-shrink: 1;
            min-width: 0; 
        }

        .card-header {
            margin-bottom: 20px;
            text-align: center;
        }

        .card-header h2 {
            color: #2c3e50;
            font-size: 1.4rem;
            margin-bottom: 6px;
        }

        .card-header p {
            color: #7f8c8d;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .gif-wrapper {
            width: 100%;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fafafa;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
        }

        .gif-wrapper img {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
                align-items: flex-start;
            }
            .card-container {
                padding: 16px;
                border-radius: 8px;
            }
            .card-header h2 {
                font-size: 1.2rem;
            }
            .card-header p {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card-header">
            <h1>LP INGENIERIA</h1 
            <h2>Servicio de ingenieria</h2>
        </div>

        <div class="gif-wrapper">
            <img src="servicio_de_ingenieria.gif" alt="Dashboard de datos">
        </div>
    </div>

</body>
</html>
