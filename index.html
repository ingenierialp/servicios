<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización de Datos del Servicio</title>
    <style>
        /* Reseteo básico y tipografía */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Contenedor principal (Tarjeta) */
        .card-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 900px; /* Controla el ancho máximo en pantallas grandes */
            overflow: hidden;
            padding: 24px;
            transition: transform 0.3s ease;
        }

        .card-container:hover {
            transform: translateY(-2px);
        }

        /* Encabezado opcional para contextualizar el GIF */
        .card-header {
            margin-bottom: 20px;
            text-align: center;
        }

        .card-header h2 {
            color: #2c3e50;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .card-header p {
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        /* Contenedor Responsive del GIF */
        .gif-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fafafa;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            overflow: hidden;
        }

        /* El truco de la responsividad */
        .gif-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain; /* Asegura que no se deforme */
        }

        /* Ajustes específicos para pantallas muy chicas (Móviles) */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .card-container {
                padding: 16px;
            }
            .card-header h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card-header">
            <h2>Métricas de Prestación de Servicios</h2>
            <p>Monitoreo de rendimiento y analítica empresarial en tiempo real</p>
        </div>

        <div class="gif-wrapper">
            <img src="servicio_de_ingenieria.gif" alt="Dashboard de datos de la empresa de servicios">
        </div>
    </div>

</body>
</html>
