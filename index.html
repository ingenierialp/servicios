<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Visualización de Datos de Servicios</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px; /* Reducido para dar más espacio en móviles */
        }

        .card-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            /* Usamos max-width para escritorio, pero en móvil ocupará el 100% disponible */
            max-width: 900px; 
            padding: 16px; /* Ajustado para pantallas chicas */
            margin: auto;
        }

        .card-header {
            margin-bottom: 16px;
            text-align: center;
        }

        .card-header h2 {
            color: #2c3e50;
            font-size: 1.3rem;
            margin-bottom: 6px;
        }

        .card-header p {
            color: #7f8c8d;
            font-size: 0.85rem;
        }

        /* CONTENEDOR DEL GIF: Forzamos el control del ancho */
        .gif-wrapper {
            width: 100%;
            max-width: 100%;
            overflow: hidden; /* Evita que cualquier desborde rompa la pantalla */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fafafa;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
        }

        /* EL GIF: Esta configuración obliga a la imagen a adaptarse */
        .gif-wrapper img {
            width: 100% !important;   /* Obliga a ocupar todo el ancho del contenedor */
            max-width: 100% !important;
            height: auto !important;  /* Recalcula la altura proporcionalmente para no deformar */
            display: block;
        }

        /* Media query específico para asegurar pantallas muy pequeñas */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }
            .card-container {
                padding: 12px;
                border-radius: 8px;
            }
            .card-header h2 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card-header">
            <h2>PRUEBA 01<h2>
            <p>Monitoreo de rendimiento y analítica empresarial</p>
        </div>

        <div class="gif-wrapper">
            <img src="servicio_de_ingenieria.gif" alt="Dashboard de datos">
        </div>
    </div>

</body>
</html>
